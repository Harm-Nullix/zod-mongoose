name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      pages: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm run test

      # PR OR PUBLISH
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # TAGGING FALLBACK
      - name: Manual Tagging Fallback
        if: steps.changesets.outputs.published == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | .name + "@" + .version' | while read tag; do
            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              git tag "$tag"
              git push origin "$tag"
            fi
          done

      # DOCS & ARTIFACTS
      - name: Build docs
        run: pnpm --filter docs run build

      - name: Prepare docs artifact
        run: |
          mkdir -p docs-build
          cp -r packages/docs/.output/* docs-build/

      - name: Upload Docs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-site
          path: docs-build/
          retention-days: 7

      # GITHUB PAGES DEPLOY
      - name: Setup Pages
        if: steps.changesets.outputs.published == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/docs/.output/

      - name: Deploy to GitHub Pages
        if: steps.changesets.outputs.published == 'true'
        uses: actions/deploy-pages@v4
